# Sensor Pinconnections:
## Mainboard:
# PB0 = Chamber temp
# PB1 = Heat-Bead left out sensor
# PC3 = Heat-Bead main sensor
# PB2 = Fan2 = FAN mainboard
# PB? = Fan? = FAN Heat-Bead center
# PB? = Fan? = FAN Heat-Bead left+right
# Y-Endstop on Y endstop pin

#####################################################################
# Includes
#####################################################################
[include BTT_EBB36.cfg]
[include cartographer.cfg]
[include Orbiter2_SmartSensor.cfg]
[include mainsail.cfg]
[include input_shaper.cfg]
[include print_START.cfg]
#[include ellis_PAUSE_RESUME_CANCLE.cfg]
[include stealthburner_leds.cfg]
#[include adxl345_stm32f042.cfg]
[include KAMP_Settings.cfg]
# TODO: badfans for TheFilter: https://github.com/nateb16/VoronUsers/tree/master/printer_mods/nateb16/THE_FILTER
#[include bedfans.cfg]
[include TEST_SPEED.cfg]
[include utility_functions.cfg]
[include clean_Nozzle.cfg]
[include mainsail_user_macros.cfg]
[include print_END.cfg]
[include toolchange.cfg]
[include spoolman.cfg]

#####################################################################
# Mainsail CFG
## Client variable macro for your printer.cfg
#####################################################################
[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True  ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 45.0  ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 359.0 ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 3.0   ; the value to retract while PAUSE
variable_cancel_retract   : 5.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 50.0  ; retract speed in mm/s
variable_unretract        : 2.8   ; the value to unretract while RESUME
variable_speed_unretract  : 35.0  ; unretract speed in mm/s
variable_speed_hop        : 15.0  ; z move speed in mm/s
variable_speed_move       : 100.0 ; move speed in mm/s
variable_park_at_cancel   : True  ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 40    ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 350   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
# !!! Caution [firmware_retraction] must be defined in the printer.cfg if you set use_fw_retract: True !!!
variable_use_fw_retract   : False ; use fw_retraction instead of the manual version [True/False]
variable_idle_timeout     : 1200  ; time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
								  ; If a sensor is defined, it will be used to cancel the execution of RESUME in case no filament is detected.
variable_runout_sensor    : "filament_switch_sensor O2_sensor"
#                                   Specify the config name of the runout sensor e.g "filament_switch_sensor runout". Hint use the same as in your printer.cfg
# !!! Custom macros, please use with care and review the section of the corresponding macro.
# These macros are for simple operations like setting a status LED. Please make sure your macro does not interfere with the basic macro functions.
# Only  single line commands are supported, please create a macro if you need more than one command.
#variable_user_pause_macro : "" ;"_pre_pause"    ; Everything inside the "" will be executed after the klipper base pause (PAUSE_BASE) function
variable_user_resume_macro: "_pre_resume"    ; Everything inside the "" will be executed before the klipper base resume (RESUME_BASE) function
variable_user_cancel_macro: ""    ; Everything inside the "" will be executed before the klipper base cancel (CANCEL_PRINT_BASE) function
gcode:


#####################################################################
# Other Settings
#####################################################################

[exclude_object]

[idle_timeout]
timeout: 3600  # Zeit in Sekunden (3600 = 60 Minuten)
gcode:
  # Das hier wird ausgeführt, wenn das Timeout abläuft:
  M117 Idle Timeout erreicht
  TURN_OFF_HEATERS
  M84 ; Motoren ausschalten

[axis_twist_compensation]
#speed: 50
#   The speed (in mm/s) of non-probing moves during the calibration.
#   The default is 50.
#horizontal_move_z: 5
#   The height (in mm) that the head should be commanded to move to
#   just prior to starting a probe operation. The default is 5.
calibrate_start_x: 30
#   Defines the minimum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the starting
#   calibration position.
calibrate_end_x: 320
#   Defines the maximum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the ending
#   calibration position.
calibrate_y: 175
#   Defines the Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle during the
#   calibration process. This parameter is recommended to
#   be near the center of the bed

# For Y-axis twist compensation, specify the following parameters:
calibrate_start_y: 25
#   Defines the minimum Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle at the starting
#   calibration position for the Y axis. This parameter must be provided if
#   compensating for Y axis twist.
calibrate_end_y: 260
#   Defines the maximum Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle at the ending
#   calibration position for the Y axis. This parameter must be provided if
#   compensating for Y axis twist.
calibrate_x: 175
#   Defines the X coordinate of the calibration for Y axis twist compensation
#   This should be the X coordinate that positions the nozzle during the
#   calibration process for Y axis twist compensation. This parameter must be
#   provided and is recommended to be near the center of the bed.

#####################################################################
# Mainboard & Printer
#####################################################################

#[virtual_sdcard] is in mainsail.cfg
#path: ~/printer_data/gcodes
#on_error_gcode: CANCEL_PRINT

[mcu]
## Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_1A004A001550325635393320-if00

[temperature_sensor SKR_Pro]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

#[mcu rpi]
#serial: /tmp/klipper_host_mcu

[temperature_sensor raspberry_pi_3B]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[printer]
kinematics: corexy
max_velocity: 400
max_accel: 4800
max_z_velocity: 5
max_z_accel: 100

#####################################################################
# Steppers
#####################################################################

[stepper_x]
step_pin: PE11
dir_pin: PE10
enable_pin: !PE9
microsteps: 16
rotation_distance: 40
full_steps_per_rotation:200
endstop_pin: ^EBBCan: PB8 #^PB14  # PA1 for X-max
position_endstop: 350
position_min: 0
position_max: 350
homing_speed: 50
homing_retract_dist: 5
homing_retract_speed: 7
second_homing_speed: 7
homing_positive_dir: true

[stepper_y]
step_pin: PD8
dir_pin: PB12
enable_pin: !PD9
microsteps: 16
rotation_distance: 40
endstop_pin: ^PB13  # PA2 for Y-max
position_endstop: 360 # Triggers @360+x!
position_min: 0
position_max: 360
homing_speed: 50
homing_retract_dist: 5
homing_retract_speed: 7
second_homing_speed: 7
min_home_dist: 5
homing_positive_dir: true

## Z0 Stepper - Front Left - In Z-MOT Position
[stepper_z]
step_pin: PD14
dir_pin: PD13
enable_pin: !PD15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
#endstop_pin: !PA0 #DD for Bed Z-Endstop not in use until auto_z_calibration is installed and setup
endstop_pin: probe:z_virtual_endstop #DD old was !PA0 #BB Cartographer uses this also
#position_endstop: 5 # cartographer needs this to be commented out
#my_coppied_in: position_endstop: 1.6695 #-0.5 #Cartographer: neads to be this removed
#	Uncomment below for 300mm build
position_max: 240
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0 #old: 3; Cartographer neads 0

[safe_z_home]
home_xy_position: 175,175
z_hop: 10


##	In E1-MOT Position
##	Z1 Stepper - Rear Left
[stepper_z1]
step_pin: PE6
dir_pin: !PC13
enable_pin: !PE5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	In E2-MOT Position
##	Z2 Stepper - Rear Right
[stepper_z2]
step_pin: PE2
dir_pin: PE4
enable_pin: !PE3
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	In E3-MOT Position
##	Z3 Stepper - Front Right
[stepper_z3]
step_pin: PD12
dir_pin: !PC4
enable_pin: !PE8
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16


[quad_gantry_level]
gantry_corners:
   -60,-10
   410,420
#  Probe points
points:
   20,10   # Point 1 Estimated raw backlash:   0.00486 mm
   20,300  # Point 2 Estimated raw backlash:   0.01135 mm
   300,300 # Point 3 Estimated raw backlash:   0.00429 mm
   300,10  # Point 4 Estimated raw backlash:   0.00393 mm
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

#####################################################################
# Heated Bed
#####################################################################

[heater_bed]
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
#control: watermark
min_temp: 0
max_temp: 130

#####################################################################
# (only)Fans :)
#####################################################################

#fan for control board FAN2
[heater_fan controller_fan]
pin: PB2
kick_start_time: 0.5
heater: heater_bed
heater_temp: 45.0
fan_speed: 0.3

#####################################################################
# Temperature Sensors
#####################################################################
[temperature_sensor chamber]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin:   PB0

#####################################################################
# LED Control
#####################################################################

#[output_pin caselight ]
##  Chamber Lighting - In 5V-RGB Position
#pin: PD3
#pwm: true
#shutdown_value: 0
#value:100
#cycle_time: 0.01


########################################
# TMC UART configuration
########################################

[tmc2209 stepper_x]
uart_pin: PE7
interpolate: True
run_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_y]
uart_pin: PE15
interpolate: True
run_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z]
uart_pin: PD10
uart_address: 0
interpolate: True
run_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PC14
interpolate: True
run_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z2]
uart_pin: PC15
interpolate: true
run_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z3]
uart_pin: PA15
interpolate: true
run_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

